<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animals Capture The Flag</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(180deg, #87ceeb 0%, #5fa85f 100%);
    font-family: -apple-system, 'SF Pro', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    color: #222;
    overflow: hidden;
  }
  h1 { margin: 12px 0 4px; font-size: 28px; color: #1b3a1b; text-shadow: 1px 1px 0 #fff8; }
  #hud {
    display: flex; gap: 20px; align-items: center;
    background: rgba(255,255,255,.75);
    border-radius: 10px;
    padding: 8px 16px;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .team-red { color: #c0392b; }
  .team-blue { color: #2d6ad0; }
  #gameWrap { position: relative; }
  canvas {
    background: #6cb86c;
    border: 3px solid #2d4e2d;
    border-radius: 6px;
    display: block;
    box-shadow: 0 6px 20px rgba(0,0,0,.3);
  }
  #overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,.6);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    color: white;
    border-radius: 6px;
  }
  #overlay.hidden { display: none; }
  #overlay h2 { font-size: 36px; margin-bottom: 16px; }
  .picker-row { margin-bottom: 14px; text-align:center; }
  .picker-row .label { font-weight:700; font-size:16px; margin-bottom:6px; display:block; }
  .p1-label { color:#6aa9ff; }
  .p2-label { color:#ff7a6a; }
  .animal-picker {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
    max-width: 820px; margin: 0 auto 8px;
  }
  .animal {
    background: rgba(255,255,255,.15);
    border: 2px solid rgba(255,255,255,.3);
    padding: 10px 14px; border-radius: 10px;
    cursor: pointer; transition: all .15s;
    text-align: center;
    min-width: 120px;
  }
  .animal:hover { background: rgba(255,255,255,.3); transform: translateY(-2px); }
  .animal.selected-p1 { border-color: #6aa9ff; background: rgba(106,169,255,.28); box-shadow:0 0 0 2px #6aa9ff55; }
  .animal.selected-p2 { border-color: #ff7a6a; background: rgba(255,122,106,.28); box-shadow:0 0 0 2px #ff7a6a55; }
  .animal.selected-both { border-color: #ffd84d; background: rgba(255,216,77,.25); }
  .animal .emoji { font-size: 38px; display: block; }
  .animal .name { font-weight: 700; margin: 4px 0; }
  .animal .stats { font-size: 11px; opacity: .85; }
  button.start {
    background: #2d6ad0; color: white;
    border: none; padding: 12px 32px;
    font-size: 18px; font-weight: 700;
    border-radius: 30px; cursor: pointer;
    box-shadow: 0 4px 0 #1b4a9e;
  }
  button.start:hover { background: #3b7ae0; }
  button.start:active { transform: translateY(2px); box-shadow: 0 2px 0 #1b4a9e; }
  #controls {
    margin-top: 8px; font-size: 12px; color: #1b3a1b;
    background: rgba(255,255,255,.6); padding: 6px 12px; border-radius: 6px;
  }
</style>
</head>
<body>
  <h1>🦁 Animals Capture The Flag 🚩</h1>
  <div id="hud">
    <span class="team-blue">Blue: <span id="blueScore">0</span></span>
    <span>⏱ <span id="timer">3:00</span></span>
    <span>Flag: <span id="flagStatus">—</span></span>
    <span class="team-red">Red: <span id="redScore">0</span></span>
  </div>
  <div id="gameWrap">
    <canvas id="game" width="960" height="600"></canvas>
    <div id="overlay">
      <h2 id="overlayTitle">Pick Your Animals</h2>
      <div class="picker-row">
        <span class="label p1-label">Player 1 (Blue) — WASD + Space</span>
        <div class="animal-picker" id="picker1"></div>
      </div>
      <div class="picker-row">
        <span class="label p2-label">Player 2 (Red) — Arrows + Enter</span>
        <div class="animal-picker" id="picker2"></div>
      </div>
      <button class="start" id="startBtn">Start Match</button>
    </div>
  </div>
  <div id="controls">
    <b style="color:#2d6ad0">P1 Blue:</b> WASD move · Space attack &nbsp;|&nbsp;
    <b style="color:#c0392b">P2 Red:</b> Arrow keys move · Enter attack &nbsp;|&nbsp;
    Grab the enemy flag and bring it home — first to 3 wins!
  </div>

<script>
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;

const ANIMALS = [
  { id:'lion',     name:'Lion',     emoji:'🦁', speed:2.6, hp:100, atk:22, range:32, color:'#e28b2b' },
  { id:'elephant', name:'Elephant', emoji:'🐘', speed:1.6, hp:180, atk:28, range:36, color:'#8a8a8a' },
  { id:'fox',      name:'Fox',      emoji:'🦊', speed:3.6, hp:70,  atk:14, range:26, color:'#e87b3b' },
  { id:'gorilla',  name:'Gorilla',  emoji:'🦍', speed:2.0, hp:150, atk:26, range:30, color:'#3d3836' },
  { id:'kangaroo', name:'Kangaroo', emoji:'🦘', speed:3.0, hp:90,  atk:18, range:28, color:'#b87a4a' },
  { id:'rhino',    name:'Rhino',   emoji:'🦏', speed:2.2, hp:160, atk:24, range:32, color:'#9a9a8a' },
  { id:'cheetah',  name:'Cheetah', emoji:'🐆', speed:4.0, hp:65,  atk:15, range:26, color:'#e5c043' },
  { id:'bear',     name:'Bear',    emoji:'🐻', speed:2.2, hp:140, atk:24, range:30, color:'#5a3a22' },
  { id:'cat',      name:'Cat',     emoji:'🐱', speed:3.4, hp:75,  atk:16, range:24, color:'#d8b68a' },
];

// Build pickers for both players
let picked1 = 'lion';
let picked2 = 'gorilla';
function buildPicker(containerId, playerNum) {
  const picker = document.getElementById(containerId);
  ANIMALS.forEach(a => {
    const d = document.createElement('div');
    d.className = 'animal';
    d.dataset.id = a.id;
    d.innerHTML = `<span class="emoji">${a.emoji}</span>
      <div class="name">${a.name}</div>
      <div class="stats">SPD ${a.speed} · HP ${a.hp} · ATK ${a.atk}</div>`;
    d.onclick = () => {
      if (playerNum === 1) picked1 = a.id;
      else picked2 = a.id;
      refreshPickers();
    };
    picker.appendChild(d);
  });
}
function refreshPickers() {
  for (const [containerId, chosen, cls] of [['picker1', picked1, 'selected-p1'], ['picker2', picked2, 'selected-p2']]) {
    const picker = document.getElementById(containerId);
    [...picker.children].forEach(c => {
      c.classList.remove('selected-p1','selected-p2','selected-both');
      if (c.dataset.id === chosen) c.classList.add(cls);
    });
  }
}
buildPicker('picker1', 1);
buildPicker('picker2', 2);
refreshPickers();

// Game state
let state = null;
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ' || e.key.startsWith('Arrow') || e.key === 'Enter') e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const startBtn = document.getElementById('startBtn');

function resetOverlayForPick() {
  overlayTitle.textContent = 'Pick Your Animals';
  document.querySelectorAll('.picker-row').forEach(el => el.style.display = '');
  startBtn.textContent = 'Start Match';
  overlay.classList.remove('hidden');
}

startBtn.onclick = () => {
  overlay.classList.add('hidden');
  startGame(picked1, picked2);
};

function makeUnit(team, animalId, x, y, playerNum=0) {
  const a = ANIMALS.find(x => x.id===animalId);
  return {
    team, animalId, x, y, vx:0, vy:0,
    hp: a.hp, maxHp: a.hp, speed: a.speed, atk: a.atk, range: a.range,
    color: a.color, emoji: a.emoji, name: a.name,
    r: 16, facing: 1, attackCd: 0, hitFlash: 0,
    isPlayer: playerNum > 0, playerNum, respawnIn: 0, carryingFlag: false,
  };
}

function startGame(p1AnimalId, p2AnimalId) {
  const blueBase = { x: 80, y: H/2, r: 46, team:'blue' };
  const redBase  = { x: W-80, y: H/2, r: 46, team:'red' };

  state = {
    t: 0,
    timeLeft: 180, // seconds
    blueScore: 0,
    redScore: 0,
    blueBase, redBase,
    flags: {
      blue: { x: blueBase.x, y: blueBase.y, homeX: blueBase.x, homeY: blueBase.y, carrier: null, team:'blue' },
      red:  { x: redBase.x,  y: redBase.y,  homeX: redBase.x,  homeY: redBase.y,  carrier: null, team:'red' },
    },
    units: [],
    particles: [],
    obstacles: makeObstacles(),
    gameOver: false,
  };

  // Teams: P1 = blue, P2 = red. Each team gets 4 animals total (incl. player).
  const roster = ['lion','elephant','gorilla','kangaroo','rhino','cheetah','bear','fox','cat'];
  // Blue - P1
  const player1 = makeUnit('blue', p1AnimalId, blueBase.x + 40, blueBase.y, 1);
  state.units.push(player1);
  for (let i=0;i<3;i++) {
    const a = roster[(i*2) % roster.length];
    state.units.push(makeUnit('blue', a === p1AnimalId ? roster[(i*2+1)%roster.length] : a,
      blueBase.x + 70, blueBase.y - 60 + i*60));
  }
  // Red - P2
  const player2 = makeUnit('red', p2AnimalId, redBase.x - 40, redBase.y, 2);
  state.units.push(player2);
  for (let i=0;i<3;i++) {
    const a = roster[(i*2+1) % roster.length];
    state.units.push(makeUnit('red', a === p2AnimalId ? roster[(i*2+2)%roster.length] : a,
      redBase.x - 70, redBase.y - 60 + i*60));
  }

  state.player1 = player1;
  state.player2 = player2;
  requestAnimationFrame(loop);
}

function makeObstacles() {
  const arr = [];
  // Rocks / trees scattered, avoid bases/middle spawn
  const rng = mulberry32(1234);
  for (let i=0;i<14;i++) {
    const x = 180 + rng()*(W-360);
    const y = 60 + rng()*(H-120);
    const r = 18 + rng()*14;
    if (Math.abs(x - W/2) < 40) continue; // keep center clear-ish
    arr.push({ x, y, r, kind: rng() < 0.5 ? 'tree' : 'rock' });
  }
  return arr;
}
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function dist(a, b) { return Math.hypot(a.x-b.x, a.y-b.y); }

function tryMove(u, dx, dy) {
  const nx = u.x + dx, ny = u.y + dy;
  // bounds
  const cx = Math.max(u.r, Math.min(W-u.r, nx));
  const cy = Math.max(u.r, Math.min(H-u.r, ny));
  // obstacle collision
  let fx = cx, fy = cy;
  for (const o of state.obstacles) {
    const d = Math.hypot(fx - o.x, fy - o.y);
    const minD = u.r + o.r - 2;
    if (d < minD && d > 0) {
      const push = (minD - d);
      fx += (fx - o.x)/d * push;
      fy += (fy - o.y)/d * push;
    }
  }
  u.x = Math.max(u.r, Math.min(W-u.r, fx));
  u.y = Math.max(u.r, Math.min(H-u.r, fy));
}

function attack(u) {
  if (u.attackCd > 0 || u.respawnIn > 0) return;
  u.attackCd = 32;
  // hit cone in facing direction, 90-degree arc, u.range
  const dirX = u.facing >= 0 ? 1 : -1;
  // We track both x and y facing via last move
  const fx = u.fx || dirX, fy = u.fy || 0;
  const mag = Math.hypot(fx, fy) || 1;
  const ax = fx/mag, ay = fy/mag;
  for (const t of state.units) {
    if (t === u || t.team === u.team || t.respawnIn>0) continue;
    const dx = t.x - u.x, dy = t.y - u.y;
    const d = Math.hypot(dx, dy);
    if (d > u.range + t.r) continue;
    const dot = (dx*ax + dy*ay) / (d || 1);
    if (dot < 0.2) continue; // behind/side
    // hit
    t.hp -= u.atk;
    t.hitFlash = 10;
    // knockback
    t.x += (dx/d)*6; t.y += (dy/d)*6;
    spawnParticles(t.x, t.y, '#ff4d4d', 6);
    if (t.hp <= 0) killUnit(t, u);
  }
  // slash particles
  for (let i=0;i<5;i++) {
    state.particles.push({
      x: u.x + ax*(u.range*0.6),
      y: u.y + ay*(u.range*0.6),
      vx: ax*2 + (Math.random()-.5)*2,
      vy: ay*2 + (Math.random()-.5)*2,
      life: 14, color: '#ffffffaa'
    });
  }
}

function killUnit(t, killer) {
  spawnParticles(t.x, t.y, '#ffcc66', 16);
  if (t.carryingFlag) {
    // drop flag where killed
    const flagKey = t.team === 'blue' ? 'red' : 'blue';
    state.flags[flagKey].carrier = null;
    state.flags[flagKey].x = t.x;
    state.flags[flagKey].y = t.y;
    t.carryingFlag = false;
  }
  t.respawnIn = 180; // 3s at 60fps
  t.hp = 0;
}

function respawn(u) {
  const base = u.team === 'blue' ? state.blueBase : state.redBase;
  u.x = base.x + (Math.random()-.5)*40;
  u.y = base.y + (Math.random()-.5)*60;
  u.hp = u.maxHp;
  u.vx = u.vy = 0;
}

function spawnParticles(x, y, color, n) {
  for (let i=0;i<n;i++) {
    const a = Math.random()*Math.PI*2;
    const s = 1 + Math.random()*3;
    state.particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 20+Math.random()*14, color });
  }
}

function updatePlayer(u) {
  if (u.respawnIn > 0) return;
  let dx=0, dy=0, attackKey=false;
  if (u.playerNum === 1) {
    if (keys['w']) dy -= 1;
    if (keys['s']) dy += 1;
    if (keys['a']) dx -= 1;
    if (keys['d']) dx += 1;
    attackKey = !!(keys[' '] || keys['space']);
  } else { // P2
    if (keys['arrowup']) dy -= 1;
    if (keys['arrowdown']) dy += 1;
    if (keys['arrowleft']) dx -= 1;
    if (keys['arrowright']) dx += 1;
    attackKey = !!keys['enter'];
  }
  const mag = Math.hypot(dx, dy);
  if (mag > 0) {
    dx /= mag; dy /= mag;
    u.fx = dx; u.fy = dy;
    u.facing = dx >= 0 ? 1 : -1;
    const sp = u.speed * (u.carryingFlag ? 0.82 : 1);
    tryMove(u, dx*sp, dy*sp);
  }
  if (attackKey) attack(u);
}

function updateAI(u) {
  if (u.respawnIn > 0) return;
  const enemyFlagKey = u.team === 'blue' ? 'red' : 'blue';
  const ownFlagKey   = u.team;
  const enemyFlag    = state.flags[enemyFlagKey];
  const ownFlag      = state.flags[ownFlagKey];
  const ownBase      = u.team === 'blue' ? state.blueBase : state.redBase;

  // Decide role: if carrying flag -> return to base
  // If own flag taken -> chase carrier
  // Else -> go get enemy flag; if enemy nearby -> attack
  let target = null;

  if (u.carryingFlag) {
    target = { x: ownBase.x, y: ownBase.y };
  } else if (ownFlag.carrier) {
    target = ownFlag.carrier;
  } else {
    // Check for nearby enemy to attack
    let nearest = null, nd = 140;
    for (const e of state.units) {
      if (e.team === u.team || e.respawnIn>0) continue;
      const d = dist(u, e);
      if (d < nd) { nd = d; nearest = e; }
    }
    if (nearest && Math.random() < 0.8) {
      target = nearest;
    } else {
      // If enemy flag is at home, go get it. If dropped, go get it.
      target = { x: enemyFlag.x, y: enemyFlag.y };
    }
  }

  const dx = target.x - u.x, dy = target.y - u.y;
  const d = Math.hypot(dx, dy) || 1;
  const ux = dx/d, uy = dy/d;
  u.fx = ux; u.fy = uy;
  u.facing = ux >= 0 ? 1 : -1;

  // Small jitter
  const jx = (Math.random()-.5)*0.3, jy = (Math.random()-.5)*0.3;
  const sp = u.speed * (u.carryingFlag ? 0.85 : 1);
  tryMove(u, (ux+jx)*sp, (uy+jy)*sp);

  // Attack if enemy within range
  for (const e of state.units) {
    if (e.team === u.team || e.respawnIn>0) continue;
    if (dist(u,e) < u.range + e.r + 4) {
      const dxe = e.x - u.x, dye = e.y - u.y, de = Math.hypot(dxe,dye)||1;
      u.fx = dxe/de; u.fy = dye/de;
      attack(u);
      break;
    }
  }
}

function updateFlags() {
  for (const key of ['blue','red']) {
    const f = state.flags[key];
    if (f.carrier) {
      if (f.carrier.respawnIn > 0) {
        // carrier died — handled in kill, but safety:
        f.carrier = null;
      } else {
        f.x = f.carrier.x;
        f.y = f.carrier.y - 18;
      }
    } else {
      // Check pickup: opposing team touches it
      for (const u of state.units) {
        if (u.respawnIn > 0) continue;
        if (u.team === f.team) continue;
        if (Math.hypot(u.x - f.x, u.y - f.y) < u.r + 14) {
          f.carrier = u;
          u.carryingFlag = true;
          spawnParticles(f.x, f.y, '#ffff66', 18);
          break;
        }
      }
      // Return own flag if own team touches it while displaced
      const home = key === 'blue' ? state.blueBase : state.redBase;
      const atHome = Math.hypot(f.x - home.x, f.y - home.y) < 2;
      if (!atHome) {
        for (const u of state.units) {
          if (u.respawnIn > 0) continue;
          if (u.team !== f.team) continue;
          if (Math.hypot(u.x - f.x, u.y - f.y) < u.r + 14) {
            f.x = home.x; f.y = home.y;
            spawnParticles(home.x, home.y, '#66ff99', 14);
            break;
          }
        }
      }
    }
  }
  // Score: carrier reaches own base
  for (const key of ['blue','red']) {
    const f = state.flags[key];
    if (!f.carrier) continue;
    const carrier = f.carrier;
    const home = carrier.team === 'blue' ? state.blueBase : state.redBase;
    // Need own flag at home to score (classic CTF rule)
    const ownFlag = state.flags[carrier.team];
    const ownAtHome = Math.hypot(ownFlag.x - home.x, ownFlag.y - home.y) < 4;
    if (ownAtHome && Math.hypot(carrier.x - home.x, carrier.y - home.y) < home.r) {
      if (carrier.team === 'blue') state.blueScore++;
      else state.redScore++;
      spawnParticles(home.x, home.y, carrier.team==='blue'?'#66aaff':'#ff6666', 30);
      // Reset flag
      carrier.carryingFlag = false;
      f.carrier = null;
      f.x = f.homeX; f.y = f.homeY;
    }
  }
}

function updateParticles() {
  for (let i=state.particles.length-1;i>=0;i--) {
    const p = state.particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.94; p.vy *= 0.94;
    p.life--;
    if (p.life <= 0) state.particles.splice(i,1);
  }
}

// RENDER
function drawBase(b) {
  ctx.save();
  const col = b.team === 'blue' ? '#3074d8' : '#d84a3a';
  ctx.fillStyle = col + '55';
  ctx.strokeStyle = col;
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  // Walls (castle-like)
  ctx.fillStyle = '#e9e1c8';
  ctx.strokeStyle = '#786a4a';
  ctx.lineWidth = 2;
  for (let i=0;i<8;i++) {
    const a = i * Math.PI/4;
    const px = b.x + Math.cos(a)*(b.r+6);
    const py = b.y + Math.sin(a)*(b.r+6);
    ctx.fillRect(px-6, py-10, 12, 20);
    ctx.strokeRect(px-6, py-10, 12, 20);
  }
  ctx.restore();
}

function drawFlag(f) {
  ctx.save();
  const col = f.team === 'blue' ? '#2d6ad0' : '#c0392b';
  // pole
  ctx.strokeStyle = '#3a2a18'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(f.x, f.y+14); ctx.lineTo(f.x, f.y-22); ctx.stroke();
  // flag
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.moveTo(f.x, f.y-22);
  ctx.lineTo(f.x+22, f.y-16);
  ctx.lineTo(f.x, f.y-10);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawObstacle(o) {
  ctx.save();
  if (o.kind === 'tree') {
    // trunk
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(o.x-4, o.y, 8, 14);
    // leaves
    ctx.fillStyle = '#2f7f37';
    ctx.beginPath(); ctx.arc(o.x, o.y-4, o.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#3ea048';
    ctx.beginPath(); ctx.arc(o.x-6, o.y-8, o.r*0.7, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle = '#888';
    ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#aaa';
    ctx.beginPath(); ctx.arc(o.x-o.r*0.3, o.y-o.r*0.3, o.r*0.4, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawUnit(u) {
  if (u.respawnIn > 0) return;
  ctx.save();
  // team ring
  ctx.beginPath();
  ctx.arc(u.x, u.y, u.r+3, 0, Math.PI*2);
  ctx.fillStyle = u.team === 'blue' ? '#2d6ad088' : '#c0392b88';
  ctx.fill();
  // body
  ctx.beginPath();
  ctx.arc(u.x, u.y, u.r, 0, Math.PI*2);
  ctx.fillStyle = u.hitFlash > 0 ? '#fff' : u.color;
  ctx.fill();
  ctx.strokeStyle = '#222'; ctx.lineWidth = 2; ctx.stroke();
  // emoji
  ctx.font = '22px serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(u.emoji, u.x, u.y+1);
  // player marker
  if (u.isPlayer) {
    ctx.beginPath();
    ctx.moveTo(u.x, u.y - u.r - 8);
    ctx.lineTo(u.x - 6, u.y - u.r - 2);
    ctx.lineTo(u.x + 6, u.y - u.r - 2);
    ctx.closePath();
    ctx.fillStyle = u.playerNum === 1 ? '#6aa9ff' : '#ff7a6a'; ctx.fill();
    ctx.strokeStyle = '#222'; ctx.lineWidth = 1.5; ctx.stroke();
    // P1 / P2 label
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    const lbl = 'P' + u.playerNum;
    ctx.strokeText(lbl, u.x, u.y - u.r - 14);
    ctx.fillText(lbl, u.x, u.y - u.r - 14);
  }
  // hp bar
  const bw = 30, bh = 4;
  ctx.fillStyle = '#000a';
  ctx.fillRect(u.x-bw/2, u.y-u.r-10, bw, bh);
  ctx.fillStyle = u.hp > u.maxHp*0.5 ? '#4cd64c' : (u.hp > u.maxHp*0.25 ? '#e8c838' : '#e04a3a');
  ctx.fillRect(u.x-bw/2, u.y-u.r-10, bw*(u.hp/u.maxHp), bh);
  // carrying flag indicator
  if (u.carryingFlag) {
    const opp = u.team === 'blue' ? '#c0392b' : '#2d6ad0';
    ctx.strokeStyle = '#3a2a18'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(u.x+10, u.y-6); ctx.lineTo(u.x+10, u.y-u.r-12); ctx.stroke();
    ctx.fillStyle = opp;
    ctx.beginPath();
    ctx.moveTo(u.x+10, u.y-u.r-12);
    ctx.lineTo(u.x+24, u.y-u.r-8);
    ctx.lineTo(u.x+10, u.y-u.r-4);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function drawParticles() {
  for (const p of state.particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.max(0, p.life/30);
    ctx.fillRect(p.x-2, p.y-2, 4, 4);
  }
  ctx.globalAlpha = 1;
}

function drawField() {
  // stripes
  ctx.fillStyle = '#5fa85f';
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#6cb86c';
  for (let i=0;i<W;i+=80) ctx.fillRect(i,0,40,H);
  // center line
  ctx.strokeStyle = '#ffffff66'; ctx.lineWidth = 2;
  ctx.setLineDash([10, 10]);
  ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
  ctx.setLineDash([]);
  // border fence
  ctx.strokeStyle = '#6b4a2a'; ctx.lineWidth = 6;
  ctx.strokeRect(3,3,W-6,H-6);
}

function drawHUD() {
  document.getElementById('blueScore').textContent = state.blueScore;
  document.getElementById('redScore').textContent = state.redScore;
  const m = Math.floor(state.timeLeft/60);
  const s = Math.floor(state.timeLeft%60).toString().padStart(2,'0');
  document.getElementById('timer').textContent = `${m}:${s}`;
  let status = 'Both home';
  if (state.flags.red.carrier) status = (state.flags.red.carrier.team==='blue' ? '🔵 has 🚩' : '—');
  if (state.flags.blue.carrier) status = (state.flags.blue.carrier.team==='red' ? '🔴 has 🚩' : status);
  document.getElementById('flagStatus').textContent = status;
}

function endGame() {
  state.gameOver = true;
  overlay.classList.remove('hidden');
  const winner = state.blueScore > state.redScore ? 'Blue Wins! 🏆'
                : state.redScore > state.blueScore ? 'Red Wins! 🏆'
                : "It's a draw!";
  overlayTitle.textContent = `${winner}  ${state.blueScore} – ${state.redScore}`;
  document.querySelectorAll('.picker-row').forEach(el => el.style.display = 'none');
  startBtn.textContent = 'Play Again';
  startBtn.onclick = () => {
    resetOverlayForPick();
    startBtn.onclick = () => {
      overlay.classList.add('hidden');
      startGame(picked1, picked2);
    };
  };
}

let lastTs = 0;
function loop(ts) {
  if (!state || state.gameOver) return;
  const dt = Math.min(1/30, (ts - lastTs)/1000 || 1/60);
  lastTs = ts;
  state.t += dt;
  state.timeLeft -= dt;
  if (state.timeLeft <= 0) { state.timeLeft = 0; drawHUD(); drawAll(); endGame(); return; }

  // update
  for (const u of state.units) {
    if (u.respawnIn > 0) {
      u.respawnIn--;
      if (u.respawnIn <= 0) respawn(u);
      continue;
    }
    if (u.attackCd > 0) u.attackCd--;
    if (u.hitFlash > 0) u.hitFlash--;
    if (u.isPlayer) updatePlayer(u);
    else updateAI(u);
  }
  updateFlags();
  updateParticles();
  drawAll();
  drawHUD();

  // Win condition: first to 3
  if (state.blueScore >= 3 || state.redScore >= 3) { endGame(); return; }
  requestAnimationFrame(loop);
}

function drawAll() {
  drawField();
  drawBase(state.blueBase);
  drawBase(state.redBase);
  // draw flags behind units if at ground
  for (const key of ['blue','red']) {
    const f = state.flags[key];
    if (!f.carrier) drawFlag(f);
  }
  for (const o of state.obstacles) drawObstacle(o);
  // Sort units by y for pseudo-depth
  const sorted = [...state.units].sort((a,b)=>a.y-b.y);
  for (const u of sorted) drawUnit(u);
  // flags carried on top of unit
  for (const key of ['blue','red']) {
    const f = state.flags[key];
    if (f.carrier) drawFlag(f);
  }
  drawParticles();
}

// Initial splash draw
(function splash() {
  drawField();
  ctx.fillStyle = '#1b3a1b';
  ctx.font = 'bold 36px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('🦁 Animals CTF 🚩', W/2, H/2 - 10);
  ctx.font = '16px sans-serif';
  ctx.fillText('Pick your animal and start the match', W/2, H/2 + 20);
})();
</script>
